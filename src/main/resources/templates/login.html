<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- PREMIUM HYBRID STYLING ARCHITECTURE (OFFLINE SAFE WITH HIGH-END RESPONSIVE FEEL) -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: radial-gradient(circle at 10% 20%, rgb(242, 245, 251) 0%, rgb(237, 241, 249) 90.1%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 28px;
            padding: 45px 40px;
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.12), 0 10px 15px -3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: transform 0.3s ease;
        }

        .header-block {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-box {
            display: inline-flex;
            background: #4f46e5;
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 20px -4px rgba(80, 70, 229, 0.35);
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        .sub-title {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .input-element {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.2s ease-in-out;
        }

        .input-element:focus {
            outline: none;
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .input-element::placeholder {
            color: #94a3b8;
        }

        .submit-button {
            width: 100%;
            background: #4f46e5;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px -3px rgba(80, 70, 229, 0.25);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-button:hover {
            background: #4338ca;
            box-shadow: 0 12px 24px -3px rgba(80, 70, 229, 0.35);
        }

        .submit-button:active {
            transform: scale(0.99);
        }

        /* Premium Alert Design */
        .alert-box {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
        }
        
        .alert-success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            color: #166534;
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }

        .footer-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="header-block">
            <div class="logo-box">₹</div>
            <h1 class="main-title">Welcome Back</h1>
            <p class="sub-title">Sign in to securely track your daily expenses.</p>
        </div>

        <!-- Dynamic Status Alerts -->
        <div th:if="${error}" class="alert-box">
            <span th:text="${error}"></span>
        </div>
        
        <div th:if="${message}" class="alert-box alert-success">
            <span th:text="${message}"></span>
        </div>

        <!-- Form Submission Core -->
        <form th:action="@{/auth/perform-login}" method="POST">
            
            <div class="form-group">
                <label class="field-label">Email Address</label>
                <input type="email" name="email" required placeholder="minku@gmail.com" class="input-element">
            </div>

            <div class="form-group">
                <label class="field-label">Password</label>
                <input type="password" name="password" required class="input-element">
            </div>

            <button type="submit" class="submit-button">
                Login ➔
            </button>
            
        </form>

        <!-- REGISTER REDIRECTION ROUTE LINK ADDED -->
        <div class="footer-link">
            Don't have an account?<a th:href="@{/auth/register}">Register here</a>
        </div>
    </div>

</body>
</html>
