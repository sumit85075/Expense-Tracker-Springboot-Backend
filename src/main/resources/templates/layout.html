<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" th:fragment="primelayout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">UserSpend Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Navbar */
        .navbar { 
            background: #ffffff; height: 65px; border-bottom: 1px solid #e2e8f0; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .brand { font-size: 22px; font-weight: 850; color: #0f172a; display: flex; align-items: center; gap: 10px; letter-spacing: -0.03em; }
        .brand span { color: #4f46e5; }
        .brand-badge { background: #4f46e5; color: #ffffff; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .logout-btn { background: #fee2e2; color: #991b1b; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: 700; transition: all 0.2s ease; border: 1px solid #fca5a5; }
        .logout-btn:hover { background: #fca5a5; }
        
        /* Main Layout Shell Split */
        .main-shell { display: flex; margin-top: 65px; min-height: calc(100vh - 65px); width: 100%; position: relative; }
        
        /* Sidebar Navigation */
        .sidebar { 
            width: 260px; background: #ffffff; border-right: 1px solid #e2e8f0; 
            padding: 35px 20px; display: flex; flex-direction: column; gap: 12px; 
            position: fixed; top: 65px; bottom: 0; left: 0; z-index: 90;
        }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 14px; color: #475569; font-weight: 600; font-size: 14px; text-decoration: none; transition: all 0.2s ease; }
        .nav-link:hover { background: #f8fafc; color: #0f172a; }
        .nav-link.active { background: #4f46e5; color: #ffffff; box-shadow: 0 10px 15px -3px rgba(80, 70, 229, 0.25); }
        
        /* Main Right Side Content Container Area FIXED WIDTH ISSUE */
        .content-area { 
            margin-left: 260px; 
            flex: 1; 
            padding: 40px; 
            background: #f8fafc; 
            width: calc(100% - 260px); 
            min-height: 100%;
        }
        
        @media(max-width: 768px) { 
            .sidebar { display: none; } 
            .content-area { margin-left: 0; width: 100%; padding: 20px; } 
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">
            <div class="brand-badge">₹</div>
            <div>User<span> Spend</span></div>
        </div>
        <div class="user-section">
            <span style="font-size: 14px; font-weight: 600; color: #334155;" th:text="${session.userName != null ? session.userName : 'Sumit Kumar'}">Sumit Kumar</span>
            <a th:href="@{/auth/logout}" class="logout-btn">Logout ➔</a>
        </div>
    </div>
    
    <div class="main-shell">
        <aside class="sidebar">
            <a th:href="@{/dashboard}" class="nav-link">📊 Dashboard View</a>
            <a th:href="@{/expenses/add-view}" class="nav-link active">➕ Add New Expense</a>
        </aside>
        
        <main class="content-area">
            <!-- Thymeleaf Injection Block -->
            <div th:replace="${content}"></div>
        </main>
    </div>
</body>
</html>
