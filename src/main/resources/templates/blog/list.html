<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog - Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Blog Posts</h1>
        <a class="btn btn-primary" th:href="@{/blog/new}">New Post</a>
    </div>

    <div th:if="${posts.empty}">No posts yet.</div>
    <div class="list-group">
        <a th:each="post : ${posts}" th:href="@{'/blog/view/' + ${post.id}}" class="list-group-item list-group-item-action">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1" th:text="${post.title}">Title</h5>
                <small th:text="${post.createdAt}">date</small>
            </div>
            <p class="mb-1" th:text="${#strings.substring(post.content,0,150)} + '...'">excerpt</p>
            <small th:text="${post.author}">author</small>
        </a>
    </div>
</div>
</body>
</html>
